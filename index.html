<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本語</title>
<meta name="theme-color" content="#ffffff">
<style>
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeecea;--text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --green:#1D9E75;--gbg:#EAF3DE;--gtxt:#3B6D11;--gbrd:#97C459;
  --bbg:#E6F1FB;--btxt:#185FA5;--bbrd:#85B7EB;
  --rbg:#FCEBEB;--rtxt:#A32D2D;--rbrd:#F09595;
  --abg:#FAEEDA;--atxt:#854F0B;
  --pbg:#EEEDFE;--ptxt:#3C3489;
  --obg:#FFF3E0;--otxt:#E65100;--obrd:#FFB74D;
  --r8:8px;--r12:12px;--r16:16px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f0f0f0;--text2:#aeaeb2;--text3:#6e6e73;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --gbg:#173404;--gtxt:#C0DD97;--gbrd:#3B6D11;
  --bbg:#042C53;--btxt:#B5D4F4;--bbrd:#185FA5;
  --rbg:#501313;--rtxt:#F7C1C1;--rbrd:#A32D2D;
  --abg:#412402;--atxt:#FAC775;--pbg:#26215C;--ptxt:#CECBF6;
  --obg:#3E2000;--otxt:#FFB74D;--obrd:#E65100;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
.app{max-width:480px;margin:0 auto;background:var(--bg3);min-height:100vh;}
.header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px 8px;position:sticky;top:0;z-index:20;}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.htitle{font-size:20px;font-weight:600;flex:1;}
.hlvl-badge{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:600;cursor:pointer;}
.hlvl-n5{background:#E6F1FB;color:#185FA5;}
.hlvl-n4{background:#EAF3DE;color:#3B6D11;}
.hlvl-n3{background:#FAEEDA;color:#854F0B;}
.hset-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.gsearch-wrap{position:relative;margin-bottom:6px;}
.gsearch{width:100%;padding:8px 34px 8px 12px;border:0.5px solid var(--border);border-radius:var(--r8);font-size:14px;background:var(--bg2);color:var(--text);outline:none;}
.gsearch:focus{border-color:var(--green);background:var(--bg);}
.gclear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;cursor:pointer;background:none;border:none;padding:0;display:none;}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s;}
.pf-n5{background:#185FA5;}.pf-n4{background:var(--green);}.pf-n3{background:#854F0B;}
.nav{display:flex;background:var(--bg);border-bottom:0.5px solid var(--border);}
.nav-btn{flex:1;padding:10px 2px;border:none;background:transparent;color:var(--text2);font-size:10px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green);}
.screen{display:none;padding:14px 16px;}
.screen.active{display:block;}
.sec-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;}

/* Loading state */
.load-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;}
.load-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-title{font-size:15px;font-weight:500;}
.load-sub{font-size:13px;color:var(--text2);text-align:center;}
.load-prog{width:200px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.load-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .2s;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);border-radius:var(--r16) var(--r16) 0 0;padding:20px 20px 32px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .25s ease;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-drag{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.lvl-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.lvl-card{border:0.5px solid var(--border);border-radius:var(--r12);padding:14px;cursor:pointer;position:relative;}
.lvl-card.active-lvl{border-width:2px;}
.lvl-card.locked{opacity:.5;}
.lvl-card-top{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.lvl-icon{font-size:20px;}
.lvl-name{font-size:15px;font-weight:600;}
.lvl-status{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.lvl-desc{font-size:12px;color:var(--text2);margin-bottom:8px;}
.lvl-pbar{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:4px;}
.lvl-pfill{height:100%;border-radius:2px;transition:width .3s;}
.lvl-ptxt{font-size:11px;color:var(--text2);}
.lvl-actions{display:flex;gap:8px;margin-top:10px;}
.lvl-btn{flex:1;padding:7px;border-radius:var(--r8);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);}
.lvl-btn:active{opacity:.7;}
.lvl-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
.lvl-btn.skip{background:var(--bg2);color:var(--text2);}
.modal-close{width:100%;padding:12px;border-radius:var(--r12);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;}

/* Search */
.search-results{padding:12px 16px;display:none;}
.sr-section{margin-bottom:14px;}
.sr-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;}
.sr-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r8);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.sr-item:active{opacity:.7;}
.sr-jp{font-size:22px;min-width:38px;}
.sr-read{font-size:11px;color:var(--text2);}
.sr-mean{font-size:13px;font-weight:500;}
.sr-tag{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;margin-left:auto;}
.sr-empty{text-align:center;padding:2rem;color:var(--text2);font-size:14px;}

/* SRS */
.flashcard{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r16);padding:28px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;min-height:195px;position:relative;user-select:none;margin-bottom:12px;}
.fc-tag{position:absolute;top:11px;left:13px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bbg);color:var(--btxt);font-weight:500;}
.fc-lvl{position:absolute;top:11px;right:13px;font-size:10px;color:var(--text3);}
.fc-k{font-size:76px;line-height:1;margin-bottom:8px;}
.fc-r{font-size:17px;color:var(--text2);margin-bottom:5px;display:none;}
.fc-m{font-size:15px;font-weight:500;display:none;}
.fc-hint{font-size:12px;color:var(--text3);margin-top:12px;}
.flipped .fc-r,.flipped .fc-m{display:block;}
.flipped .fc-hint{display:none;}
.srs-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.srs-btn{padding:10px 0;border-radius:var(--r8);border:0.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;line-height:1.5;}
.srs-btn:active{opacity:.7;}
.srs-btn.hard{background:var(--rbg);color:var(--rtxt);border-color:var(--rbrd);}
.srs-btn.ok{background:var(--abg);color:var(--atxt);border-color:#FAC775;}
.srs-btn.easy{background:var(--gbg);color:var(--gtxt);border-color:var(--gbrd);}
.stats-row{display:flex;gap:8px;}
.stat-box{flex:1;text-align:center;padding:10px 6px;background:var(--bg);border-radius:var(--r8);border:0.5px solid var(--border);}
.stat-n{font-size:22px;font-weight:600;}
.stat-l{font-size:10px;color:var(--text2);margin-top:2px;}
.done-card{background:var(--bg);border-radius:var(--r16);padding:36px 20px;text-align:center;}
.done-emoji{font-size:48px;margin-bottom:10px;}
.done-title{font-size:17px;font-weight:600;margin-bottom:6px;}
.done-sub{font-size:13px;color:var(--text2);}

/* Kanji */
.kpanel{background:var(--bg);border-radius:var(--r12);border:0.5px solid var(--border);padding:14px;margin-bottom:12px;}
.kp-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.anim-box{width:165px;min-width:165px;}
.svg-frame{width:150px;height:150px;background:var(--bg2);border-radius:var(--r12);margin-bottom:7px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.svg-frame svg{width:100%;height:100%;}
.anim-ctrl{display:flex;gap:4px;align-items:center;justify-content:center;}
.ac-btn{padding:5px 10px;border-radius:var(--r8);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;}
.ac-btn.play{background:var(--gbg);color:var(--gtxt);border-color:var(--gbrd);}
.ac-num{font-size:11px;color:var(--text2);min-width:30px;text-align:center;}
.kinfo-m{font-size:15px;font-weight:600;margin-bottom:9px;}
.kinfo-r{font-size:12px;color:var(--text2);margin-bottom:4px;}
.kinfo-r b{color:var(--text);font-weight:500;}
.rads{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.rad{padding:2px 7px;background:var(--bg2);border-radius:var(--r8);font-size:13px;}
.mark-btn{width:100%;padding:9px;border-radius:var(--r8);font-size:13px;font-weight:500;cursor:pointer;}
.mark-btn:active{opacity:.7;}
.mark-btn.learn{border:0.5px solid var(--gbrd);background:var(--gbg);color:var(--gtxt);}
.mark-btn.unlearn{border:0.5px solid var(--rbrd);background:var(--rbg);color:var(--rtxt);}
.k-filters{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;}
.k-filter{padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);font-size:11px;cursor:pointer;font-weight:500;}
.k-filter.on{background:var(--bbg);color:var(--btxt);border-color:var(--bbrd);}
.k-search{width:100%;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--r8);font-size:13px;background:var(--bg);color:var(--text);margin-bottom:9px;outline:none;}
.k-search:focus{border-color:var(--green);}
.kanji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.k-tile{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r8);cursor:pointer;font-size:22px;}
.k-tile:active{transform:scale(.92);}
.k-tile.learned{background:var(--gbg);border-color:var(--gbrd);}
.k-tile.sel{border:2px solid var(--green);}

/* Grammar */
.grammar-list{display:flex;flex-direction:column;gap:7px;}
.g-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);padding:13px;cursor:pointer;}
.g-head{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.g-pattern{font-size:14px;font-weight:600;}
.g-lvl{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;}
.g-lvl.n5{background:var(--bbg);color:var(--btxt);}
.g-lvl.n4{background:var(--gbg);color:var(--gtxt);}
.g-lvl.n3{background:var(--abg);color:var(--atxt);}
.g-meaning{font-size:12px;color:var(--text2);margin-top:3px;}
.g-body{display:none;margin-top:11px;border-top:0.5px solid var(--border);padding-top:11px;}
.g-card.open .g-body{display:block;}
.g-ex{margin-bottom:7px;}
.g-ex-jp{font-size:15px;font-weight:500;margin-bottom:2px;}
.g-ex-ru{font-size:12px;color:var(--text2);}

/* Exceptions */
.exc-section{margin-bottom:18px;}
.exc-title{font-size:14px;font-weight:600;margin-bottom:10px;}
.exc-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);padding:12px 14px;margin-bottom:7px;cursor:pointer;}
.exc-card.open .exc-body{display:block;}
.exc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.exc-word{font-size:16px;font-weight:600;}
.exc-read{font-size:11px;color:var(--text2);margin-top:1px;}
.exc-badge{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:500;}
.exc-badge.trap{background:var(--rbg);color:var(--rtxt);border:0.5px solid var(--rbrd);}
.exc-badge.irr{background:var(--obg);color:var(--otxt);border:0.5px solid var(--obrd);}
.exc-badge.rule{background:var(--pbg);color:var(--ptxt);}
.exc-body{display:none;margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;}
.exc-explain{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.6;}
.exc-explain b{color:var(--text);font-weight:500;}
.exc-rule{font-size:12px;padding:6px 10px;border-radius:var(--r8);margin-bottom:5px;}
.exc-rule.wrong{background:var(--rbg);color:var(--rtxt);}
.exc-rule.right{background:var(--gbg);color:var(--gtxt);}
.exc-examples{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.exc-eg .jp{font-size:14px;font-weight:500;}
.exc-eg .ru{font-size:12px;color:var(--text2);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gbg);color:var(--gtxt);border:0.5px solid var(--gbrd);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;}
.svg-loading{font-size:12px;color:var(--text3);text-align:center;}
.svg-fallback{font-size:60px;text-align:center;}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="hrow">
    <span class="htitle">日本語</span>
    <span class="hlvl-badge hlvl-n5" id="hlvl" onclick="openSettings()">N5</span>
    <button class="hset-btn" onclick="openSettings()">⚙️</button>
  </div>
  <div class="gsearch-wrap">
    <input class="gsearch" id="gsearch" placeholder="🔍  Поиск кандзи и слов..." oninput="globalSearch(this.value)">
    <button class="gclear" id="gclear" onclick="clearSearch()">✕</button>
  </div>
  <div class="prog-bar"><div class="prog-fill pf-n5" id="main-prog" style="width:0%"></div></div>
</div>
<nav class="nav">
  <button class="nav-btn active" onclick="showTab('srs',this)">Карточки</button>
  <button class="nav-btn" onclick="showTab('kanji',this)">漢字</button>
  <button class="nav-btn" onclick="showTab('grammar',this)">Грамм.</button>
  <button class="nav-btn" onclick="showTab('exc',this)">⚠️ Искл.</button>
</nav>
<div class="search-results" id="search-results"></div>

<!-- SRS -->
<div class="screen active" id="tab-srs">
  <div id="card-area">
    <div class="flashcard" id="fc" onclick="flipCard()">
      <div class="fc-tag" id="fc-tag"></div>
      <div class="fc-lvl" id="fc-lvl"></div>
      <div class="fc-k" id="fc-k"></div>
      <div class="fc-r" id="fc-r"></div>
      <div class="fc-m" id="fc-m"></div>
      <div class="fc-hint">нажми, чтобы раскрыть</div>
    </div>
  </div>
  <div class="srs-btns" id="srs-btns" style="display:none">
    <button class="srs-btn hard" onclick="rateCard(1)">Сложно<br><span style="font-size:10px;opacity:.7">завтра</span></button>
    <button class="srs-btn ok" onclick="rateCard(3)">Нормально<br><span style="font-size:10px;opacity:.7">4 дня</span></button>
    <button class="srs-btn easy" onclick="rateCard(5)">Легко<br><span style="font-size:10px;opacity:.7">10 дней</span></button>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-n" id="s-due">0</div><div class="stat-l">осталось</div></div>
    <div class="stat-box"><div class="stat-n" id="s-done">0</div><div class="stat-l">сделано</div></div>
    <div class="stat-box"><div class="stat-n" id="s-streak">0</div><div class="stat-l">дней подряд</div></div>
  </div>
</div>

<!-- Kanji -->
<div class="screen" id="tab-kanji">
  <div class="kpanel" id="k-panel" style="display:none">
    <div class="kp-top">
      <div class="anim-box">
        <div class="svg-frame" id="svg-frame"><div class="svg-loading">выбери кандзи</div></div>
        <div class="anim-ctrl">
          <button class="ac-btn" onclick="stepS(-1)">←</button>
          <span class="ac-num" id="s-num">—</span>
          <button class="ac-btn" onclick="stepS(1)">→</button>
          <button class="ac-btn play" onclick="playAnim()">▶</button>
        </div>
      </div>
      <div>
        <div class="kinfo-m" id="k-mean"></div>
        <div class="kinfo-r">音: <b id="k-on"></b></div>
        <div class="kinfo-r">訓: <b id="k-kun"></b></div>
        <div class="kinfo-r">Штрихов: <b id="k-s"></b></div>
        <div class="rads" id="k-rads"></div>
      </div>
    </div>
    <button class="mark-btn learn" id="mark-btn" onclick="toggleLearned()">Отметить как выученный</button>
  </div>
  <input class="k-search" id="k-search" placeholder="Поиск кандзи или значения..." oninput="renderGrid()">
  <div class="k-filters">
    <button class="k-filter on" onclick="setKFilter('all',this)">Все</button>
    <button class="k-filter" onclick="setKFilter('new',this)">Новые</button>
    <button class="k-filter" onclick="setKFilter('done',this)">Выученные</button>
    <button class="k-filter" onclick="setKFilter('easy',this)">≤4 штриха</button>
    <button class="k-filter" onclick="setKFilter('hard',this)">8+ штрихов</button>
  </div>
  <div class="sec-label" id="grid-label"></div>
  <div class="kanji-grid" id="k-grid"></div>
</div>

<!-- Grammar -->
<div class="screen" id="tab-grammar">
  <div class="k-filters" id="g-filters">
    <button class="k-filter on" onclick="setGFilter('all',this)">Все</button>
    <button class="k-filter" onclick="setGFilter('N5',this)">N5</button>
    <button class="k-filter" onclick="setGFilter('N4',this)">N4</button>
    <button class="k-filter" onclick="setGFilter('N3',this)">N3</button>
  </div>
  <div class="grammar-list" id="grammar-list"></div>
</div>

<!-- Exceptions -->
<div class="screen" id="tab-exc">
  <div class="exc-section"><div class="exc-title">🪤 Слова-ловушки</div><div id="exc-traps"></div></div>
  <div class="exc-section"><div class="exc-title">🔀 Нерегулярные глаголы</div><div id="exc-irreg"></div></div>
  <div class="exc-section"><div class="exc-title">📌 Правила с исключениями</div><div id="exc-rules"></div></div>
</div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title">Уровень обучения</div>
    <div class="modal-sub">Выбери активный уровень или разблокируй вручную</div>
    <div class="lvl-cards" id="lvl-cards"></div>
    <button class="modal-close" onclick="closeSettings()">Готово</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== STATIC N5 DATA =====
const N5_KANJI = [

// ===== FETCH KANJI FROM API =====
async function fetchKanjiLevel(lvl){
  const jlptNum = LEVEL_INFO[lvl].jlpt;
  showLoadScreen(lvl);
  try{
    // Step 1: get list of kanji chars for this JLPT level
    const listRes = await fetch(`https://kanjiapi.dev/v1/kanji/jlpt/${jlptNum}`);
    if(!listRes.ok) throw new Error('list fetch failed');
    const charList = await listRes.json(); // array of kanji chars
    
    // Step 2: fetch each kanji's details (batch, max 100 for now)
    const sample = charList.slice(0, 150); // reasonable limit
    const results = [];
    let done = 0;
    
    // Fetch in parallel batches of 20
    for(let i=0;i<sample.length;i+=20){
      const batch = sample.slice(i,i+20);
      const batchRes = await Promise.all(batch.map(ch=>
        fetch(`https://kanjiapi.dev/v1/kanji/${encodeURIComponent(ch)}`)
          .then(r=>r.ok?r.json():null)
          .catch(()=>null)
      ));
      batchRes.forEach(d=>{
        if(!d)return;
        results.push({
          k: d.kanji,
          m: d.meanings.slice(0,2).join('/') || '—',
          on: (d.on_readings||[]).slice(0,2).join('、') || '—',
          kun: (d.kun_readings||[]).slice(0,2).map(r=>r.replace(/\..*/,'')).join('、') || '—',
          s: d.stroke_count || 0,
          r: []
        });
      });
      done += batch.length;
      updateLoadProgress(Math.round(done/sample.length*100), done, sample.length);
    }
    
    KANJI_CACHE[lvl] = results;
    saveKanjiCache();
    hideLoadScreen();
    showToast(`${lvl}: загружено ${results.length} кандзи!`, 2000);
    return true;
  }catch(e){
    hideLoadScreen();
    showToast('Ошибка загрузки. Проверь интернет.', 2500);
    return false;
  }
}

  const sub=document.getElementById('load-sub');if(sub)sub.textContent=`Загружено ${done} из ${total} кандзи...`;

      :`<span class="lvl-status" style="background:var(--bg2);color:var(--text3)">🔒 Заблокирован</span>`;

    let actionsHtml='';
    if(isActive&&!isCompleted){
      actionsHtml=`<div class="lvl-actions"><button class="lvl-btn skip" onclick="markCompleted('${lvl}')">Отметить как пройденный</button></div>`;
    } else if(!isActive&&isUnlocked){
      actionsHtml=`<div class="lvl-actions"><button class="lvl-btn primary" onclick="setActiveLevel('${lvl}')">Учить сейчас</button>${!isCompleted?`<button class="lvl-btn skip" onclick="markCompleted('${lvl}')">Уже знаю ✓</button>`:''}</div>`;
    } else if(!isUnlocked&&canUnlock){
      actionsHtml=`<div class="lvl-actions"><button class="lvl-btn primary" onclick="unlockLevel('${lvl}')">Разблокировать</button><button class="lvl-btn skip" onclick="unlockAndSkip('${lvl}')">Знаю, пропустить</button></div>`;
    }

    const card=document.createElement('div');
    card.className='lvl-card'+(isActive?' active-lvl':'')+((!isUnlocked&&!canUnlock)?' locked':'');
    if(isActive)card.style.borderColor=info.color;
    card.innerHTML=`
      <div class="lvl-card-top">
        <span class="lvl-icon">${info.icon}</span>
        <span class="lvl-name">${info.name}</span>
        ${statusHtml}
      </div>
      <div class="lvl-desc">${descText}</div>
      ${total?`<div class="lvl-pbar"><div class="lvl-pfill" style="width:${pct}%;background:${info.color}"></div></div>
      <div class="lvl-ptxt">${learned}/${total} кандзи выучено</div>`:''}
      ${actionsHtml}`;
    c.appendChild(card);
  });
}

async function setActiveLevel(lvl){
  ST.activeLvl=lvl;saveState();
  closeSettings();
  if(!KANJI_CACHE[lvl]){
    showTab('kanji',document.querySelectorAll('.nav-btn')[1]);
    await fetchKanjiLevel(lvl);
  }
  applyLevel();
}
async function unlockLevel(lvl){
  if(!ST.unlockedLvls.includes(lvl))ST.unlockedLvls.push(lvl);
  ST.activeLvl=lvl;saveState();
  closeSettings();
  if(!KANJI_CACHE[lvl]){
    showTab('kanji',document.querySelectorAll('.nav-btn')[1]);
    await fetchKanjiLevel(lvl);
  }
  applyLevel();
  showToast(lvl+' разблокирован!',2000);
}
async function unlockAndSkip(lvl){
  if(!ST.unlockedLvls.includes(lvl))ST.unlockedLvls.push(lvl);
  if(!ST.completedLvls.includes(lvl))ST.completedLvls.push(lvl);
  const next=LEVELS[LEVELS.indexOf(lvl)+1];
  if(next&&!ST.unlockedLvls.includes(next))ST.unlockedLvls.push(next);
  ST.activeLvl=next||lvl;saveState();
  closeSettings();
  if(next&&!KANJI_CACHE[next]){
    showTab('kanji',document.querySelectorAll('.nav-btn')[1]);
    await fetchKanjiLevel(next);
  }
  applyLevel();
  showToast(lvl+' пропущен, переходим к '+(next||lvl),2000);
}
function markCompleted(lvl){
  if(!ST.completedLvls.includes(lvl))ST.completedLvls.push(lvl);
  const next=LEVELS[LEVELS.indexOf(lvl)+1];
  if(next&&!ST.unlockedLvls.includes(next))ST.unlockedLvls.push(next);
  if(next)ST.activeLvl=next;
  saveState();applyLevel();renderLevelCards();
  showToast(next?lvl+' пройден! Открыт '+next:lvl+' пройден!',2000);
}

function applyLevel(){
  const lvl=ST.activeLvl;
  const info=LEVEL_INFO[lvl];
  const hb=document.getElementById('hlvl');
  hb.textContent=lvl;
  hb.className='hlvl-badge hlvl-'+lvl.toLowerCase();
  const pf=document.getElementById('main-prog');
  pf.className='prog-fill pf-'+lvl.toLowerCase();
  buildQueue();updateProgress();
  selIdx=null;
  document.getElementById('k-panel').style.display='none';
  renderGrid();
  gFilter='all';
  document.querySelectorAll('#g-filters .k-filter').forEach(b=>b.classList.remove('on'));
  document.querySelector('#g-filters .k-filter').classList.add('on');
  document.getElementById('grammar-list').innerHTML='';
  renderGrammar();
}

function updateProgress(){
  const lvl=ST.activeLvl;const k=KANJI_CACHE[lvl];if(!k)return;
  const learned=k.filter((_,i)=>ST.learned[lvl+'_'+i]).length;
  document.getElementById('main-prog').style.width=Math.round(learned/k.length*100)+'%';
}

// ===== GLOBAL SEARCH =====
function globalSearch(q){
  const sr=document.getElementById('search-results');
  const gclear=document.getElementById('gclear');
  q=q.trim();
  const activeScreen=document.querySelector('.screen.active');
  if(!q){sr.style.display='none';if(activeScreen)activeScreen.style.display='';gclear.style.display='none';return;}
  gclear.style.display='block';sr.style.display='block';
  if(activeScreen)activeScreen.style.display='none';
  const ql=q.toLowerCase();
  let kRes=[];
  LEVELS.forEach(lvl=>{
    const k=KANJI_CACHE[lvl];if(!k)return;
    k.forEach((c,i)=>{
      if(c.k.includes(q)||c.m.toLowerCase().includes(ql)||c.on.includes(q)||c.kun.includes(q))
        kRes.push({...c,lvl,i});
    });
  });
  let html='';
  if(kRes.length){
    html+=`<div class="sr-section"><div class="sr-label">Кандзи — ${kRes.length} рез.</div>`;
    kRes.slice(0,30).forEach(k=>{
      html+=`<div class="sr-item" onclick="goToKanji('${k.lvl}',${k.i})">
        <div class="sr-jp">${k.k}</div>
        <div style="flex:1"><div class="sr-read">${k.on} / ${k.kun}</div><div class="sr-mean">${k.m}</div></div>
        <span class="sr-tag" style="background:var(--bbg);color:var(--btxt)">${k.lvl}</span>
      </div>`;
    });
    html+='</div>';
  }
  if(!kRes.length)html='<div class="sr-empty">Ничего не найдено по «'+q+'»<br><span style="font-size:12px;color:var(--text3)">Подсказка: N4 и N3 кандзи доступны после разблокировки</span></div>';
  sr.innerHTML=html;
}
function clearSearch(){
  document.getElementById('gsearch').value='';globalSearch('');
  const s=document.querySelector('.screen.active');if(s)s.style.display='';
}
async function goToKanji(lvl,i){
  clearSearch();
  if(ST.activeLvl!==lvl){
    ST.activeLvl=lvl;
    if(!KANJI_CACHE[lvl])await fetchKanjiLevel(lvl);
    applyLevel();
  }
  showTab('kanji',document.querySelectorAll('.nav-btn')[1]);
  setTimeout(()=>openKanji(i),100);
}

// ===== SRS =====
let queue=[],curCard=null,cardFlipped=false,doneCount=0;
function buildQueue(){
  const lvl=ST.activeLvl;const k=KANJI_CACHE[lvl];if(!k){showDoneScreen();return;}
  const cards=k.map((c,i)=>({
    id:lvl+'_'+i,kanji:c.k,lvl,
    read:c.kun&&c.kun!=='—'?c.kun.split('、')[0]+' ('+c.on.split('、')[0]+')':c.on.split('、')[0],
    mean:c.m,tag:c.s<=3?'простой':c.s<=6?'средний':'сложный'
  }));
  const now=new Date();
  queue=cards.filter(c=>{const p=ST.progress[c.id];if(!p)return true;return new Date(p.due)<=now;}).slice(0,20);
  doneCount=0;
  if(!queue.length){showDoneScreen();return;}
  loadCard();updateSRSStats();
}
function loadCard(){
  if(!queue.length){showDoneScreen();return;}
  curCard=queue[0];cardFlipped=false;
  const fc=document.getElementById('fc');fc.className='flashcard';
  document.getElementById('fc-k').textContent=curCard.kanji;
  document.getElementById('fc-r').textContent=curCard.read;
  document.getElementById('fc-m').textContent=curCard.mean;
  document.getElementById('fc-tag').textContent=curCard.tag;
  document.getElementById('fc-lvl').textContent=curCard.lvl+' · '+queue.length+' карт';
  document.getElementById('srs-btns').style.display='none';
  const ca=document.getElementById('card-area');ca.innerHTML='';ca.appendChild(fc);
}
function showDoneScreen(){
  document.getElementById('card-area').innerHTML='<div class="done-card"><div class="done-emoji">🎉</div><div class="done-title">На сегодня всё!</div><div class="done-sub">Все карточки '+ST.activeLvl+' повторены.<br>Возвращайся завтра.</div></div>';
  document.getElementById('srs-btns').style.display='none';
}
function flipCard(){
  if(!curCard)return;cardFlipped=!cardFlipped;
  document.getElementById('fc').classList.toggle('flipped',cardFlipped);
  document.getElementById('srs-btns').style.display=cardFlipped?'grid':'none';
}
function rateCard(r){
  if(!curCard)return;
  const days=r===1?1:r===3?4:10;
  const due=new Date();due.setDate(due.getDate()+days);
  ST.progress[curCard.id]={due:due.toISOString(),r};
  if(r>=3){doneCount++;ST.doneToday++;}
  if(r===5)ST.learned[curCard.id]=true;
  queue.shift();saveState();updateSRSStats();updateProgress();
  if(!queue.length)showDoneScreen();else loadCard();
}
function updateSRSStats(){
  document.getElementById('s-due').textContent=queue.length;
  document.getElementById('s-done').textContent=doneCount;
  document.getElementById('s-streak').textContent=ST.streak;
}

// ===== KANJI =====
let kFilter='all',selIdx=null,kStrokes=[],kStrokeCur=0,kAnimTimer=null;
function toHex(ch){return ch.codePointAt(0).toString(16).padStart(5,'0');}
async function loadSVG(ch){
  const fr=document.getElementById('svg-frame');
  fr.innerHTML='<div class="svg-loading">загрузка...</div>';
  document.getElementById('s-num').textContent='...';
  kStrokes=[];kStrokeCur=0;
  try{
    const res=await fetch(`https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${toHex(ch)}.svg`);
    if(!res.ok)throw 0;
    const txt=await res.text();
    const doc=new DOMParser().parseFromString(txt,'image/svg+xml');
    kStrokes=Array.from(doc.querySelectorAll('path')).map(p=>p.getAttribute('d')).filter(Boolean);
    renderStrokes(kStrokes.length);setTimeout(()=>playAnim(),150);
  }catch(e){
    fr.innerHTML=`<div class="svg-fallback">${ch}</div>`;
    document.getElementById('s-num').textContent='—';
  }
}
function renderStrokes(n){
  if(!kStrokes.length)return;
  const fr=document.getElementById('svg-frame');
  let paths='';
  kStrokes.forEach((d,i)=>{
    const cur=i===n-1,past=i<n-1;
    paths+=`<path d="${d}" stroke="${cur?'#1D9E75':past?'#888':'transparent'}" stroke-opacity="${cur?1:past?.35:0}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
  });
  fr.innerHTML=`<svg viewBox="0 0 109 109" xmlns="http://www.w3.org/2000/svg" width="150" height="150">
    <rect x="0" y="0" width="109" height="109" fill="none" stroke="rgba(128,128,128,0.15)" stroke-width="0.5"/>
    <line x1="54.5" y1="0" x2="54.5" y2="109" stroke="rgba(128,128,128,0.12)" stroke-width="0.5"/>
    <line x1="0" y1="54.5" x2="109" y2="54.5" stroke="rgba(128,128,128,0.12)" stroke-width="0.5"/>
    ${paths}</svg>`;
  kStrokeCur=n;document.getElementById('s-num').textContent=n+'/'+kStrokes.length;
}
function stepS(dir){clearTimeout(kAnimTimer);renderStrokes(Math.min(Math.max(1,kStrokeCur+dir),kStrokes.length));}
function playAnim(){
  clearTimeout(kAnimTimer);if(!kStrokes.length)return;kStrokeCur=0;
  function step(){kStrokeCur++;renderStrokes(kStrokeCur);if(kStrokeCur<kStrokes.length)kAnimTimer=setTimeout(step,500);}step();
}
function openKanji(i){
  clearTimeout(kAnimTimer);selIdx=i;
  const k=currentKanji()[i];if(!k)return;
  document.getElementById('k-mean').textContent=k.m;
  document.getElementById('k-on').textContent=k.on;
  document.getElementById('k-kun').textContent=k.kun;
  document.getElementById('k-s').textContent=k.s;
  document.getElementById('k-rads').innerHTML=(k.r||[]).map(r=>`<span class="rad">${r}</span>`).join('');
  const key=ST.activeLvl+'_'+i;
  const learned=!!ST.learned[key];
  const mb=document.getElementById('mark-btn');
  mb.textContent=learned?'Снять отметку':'Отметить как выученный';
  mb.className='mark-btn '+(learned?'unlearn':'learn');
  document.getElementById('k-panel').style.display='block';
  document.getElementById('k-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  loadSVG(k.k);renderGrid();
}
function toggleLearned(){
  if(selIdx===null)return;
  const key=ST.activeLvl+'_'+selIdx;
  ST.learned[key]=!ST.learned[key];
  saveState();openKanji(selIdx);updateProgress();
}
function setKFilter(f,btn){
  kFilter=f;document.getElementById('k-search').value='';
  document.querySelectorAll('.k-filter').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderGrid();
}
function renderGrid(){
  if(loadScreenActive)return;
  const q=document.getElementById('k-search').value.toLowerCase();
  const grid=document.getElementById('k-grid');grid.innerHTML='';let shown=0;
  const k=currentKanji();
  if(!k||!k.length){
    grid.innerHTML='<div style="grid-column:1/-1;padding:2rem;text-align:center;color:var(--text2);font-size:13px;">Нажми ⚙️ чтобы разблокировать уровень</div>';
    document.getElementById('grid-label').textContent='';return;
  }
  k.forEach((c,i)=>{
    const key=ST.activeLvl+'_'+i;
    const learned=!!ST.learned[key];
    let pass=true;
    if(q)pass=c.k.includes(q)||c.m.toLowerCase().includes(q)||c.on.includes(q)||c.kun.includes(q);
    else if(kFilter==='new')pass=!learned;
    else if(kFilter==='done')pass=learned;
    else if(kFilter==='easy')pass=c.s<=4;
    else if(kFilter==='hard')pass=c.s>=8;
    if(!pass)return;shown++;
    const t=document.createElement('div');
    t.className='k-tile'+(learned?' learned':'')+(selIdx===i?' sel':'');
    t.textContent=c.k;t.title=c.m;t.onclick=()=>openKanji(i);
    grid.appendChild(t);
  });
  const lbl=learnedCount(ST.activeLvl);
  document.getElementById('grid-label').textContent=`${ST.activeLvl} · Показано: ${shown} · Выучено: ${lbl} из ${k.length}`;
}

// ===== GRAMMAR =====
let gFilter='all';
function setGFilter(f,btn){
  gFilter=f;document.querySelectorAll('#g-filters .k-filter').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderGrammar();
}
function renderGrammar(){
  const list=document.getElementById('grammar-list');list.innerHTML='';
  const lvl=ST.activeLvl;
  const avail=lvl==='N3'?['N5','N4','N3']:lvl==='N4'?['N5','N4']:['N5'];
  GRAMMAR.forEach(g=>{
    if(gFilter!=='all'&&g.l!==gFilter)return;
    if(!avail.includes(g.l))return;
    const d=document.createElement('div');d.className='g-card';
    const exHTML=g.ex.map(e=>`<div class="g-ex"><div class="g-ex-jp">${e.jp}</div><div class="g-ex-ru">${e.ru}</div></div>`).join('');
    d.innerHTML=`<div class="g-head"><span class="g-pattern">${g.p}</span><span class="g-lvl ${g.l.toLowerCase()}">${g.l}</span></div><div class="g-meaning">${g.m}</div><div class="g-body">${exHTML}</div>`;
    d.onclick=()=>d.classList.toggle('open');list.appendChild(d);
  });
}

// ===== EXCEPTIONS =====
function renderExceptions(){
  function makeCards(data,id){
    const c=document.getElementById(id);if(c.children.length)return;
    data.forEach(e=>{
      const d=document.createElement('div');d.className='exc-card';
      const exHTML=(e.ex||[]).map(x=>`<div class="exc-eg"><div class="jp">${x.jp}</div><div class="ru">${x.ru}</div></div>`).join('');
      d.innerHTML=`<div class="exc-top"><div><div class="exc-word">${e.word}</div>${e.read?`<div class="exc-read">${e.read}</div>`:''}</div><span class="exc-badge ${e.badge}">${e.label}</span></div>
        <div class="exc-body"><div class="exc-explain">${e.explain}</div><div class="exc-rule wrong">${e.wrong}</div><div class="exc-rule right">${e.right}</div>${exHTML?`<div class="exc-examples">${exHTML}</div>`:''}</div>`;
      d.onclick=()=>d.classList.toggle('open');c.appendChild(d);
    });
  }
  makeCards(EXC_TRAPS,'exc-traps');makeCards(EXC_IRREG,'exc-irreg');makeCards(EXC_RULES,'exc-rules');
}

// ===== NAV =====
function showTab(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('search-results').style.display='none';
  document.getElementById('gsearch').value='';
  document.getElementById('gclear').style.display='none';
  document.getElementById('tab-'+id).style.display='';
  if(id==='kanji')renderGrid();
  if(id==='grammar')renderGrammar();
  if(id==='exc')renderExceptions();
}

// Init
applyLevel();
</script>
